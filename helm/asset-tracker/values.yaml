global:
  proxy:
    enabled: false
    domain: proxy.assettracker.tech
    appSlug: assettracker
  localRegistry:
    host: ""
    namespace: ""

postgresql:
  enabled: true
  architecture: standalone
  auth:
    database: asset_tracker
    username: asset_tracker
    password: asset_tracker
    postgresPassword: asset_tracker

externalDatabase:
  host: ""
  port: 5432
  username: ""
  password: ""
  database: ""

schemahero:
  image:
    repository: schemahero/schemahero
    tag: latest
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

backend:
  image:
    repository: unawake2068/asset-tracker-backend
    tag: latest
  service:
    type: ClusterIP
  port: 8080
  replicas: 1
  jwtSecret: change-me-in-production
  analyticsEnabled: true
  metrics:
    sdkEndpoint: "http://asset-tracker-sdk:3000"
    interval: "4h"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  plaid:
    enabled: false
    clientId: ""
    secret: ""
    environment: "sandbox"
  teller:
    enabled: false
    applicationId: ""
    environment: "sandbox"

frontend:
  image:
    repository: unawake2068/asset-tracker-frontend
    tag: latest
  service:
    type: ClusterIP
  port: 5173
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 256Mi

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []

ingress-nginx:
  enabled: false

replicated:
  enabled: true
  nameOverride: asset-tracker-sdk
  createPullSecret: false

cert-manager:
  enabled: false
  installCRDs: true

certManager:
  staging: true
  email: ""
  selfSigned: false

supportBundle:
  image:
    repository: replicated/troubleshoot
    tag: latest

smtp:
  host: ""
  port: 587
  username: ""
  password: ""
  from: "noreply@assettracker.local"

mailpit:
  enabled: false
  image:
    repository: axllent/mailpit
    tag: latest
  service:
    type: ClusterIP
