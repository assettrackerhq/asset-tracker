postgresql:
  enabled: true
  architecture: standalone
  auth:
    database: asset_tracker
    username: asset_tracker
    password: asset_tracker
    postgresPassword: asset_tracker

externalDatabase:
  host: ""
  port: 5432
  username: ""
  password: ""
  database: ""

schemahero:
  image:
    repository: schemahero/schemahero
    tag: latest
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

backend:
  image:
    repository: unawake2068/asset-tracker-backend
    tag: latest
  port: 8080
  replicas: 1
  jwtSecret: change-me-in-production
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

frontend:
  image:
    repository: unawake2068/asset-tracker-frontend
    tag: latest
  port: 5173
  replicas: 1
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 256Mi

ingress:
  enabled: false
  className: ""
  host: ""
  tls: []

ingress-nginx:
  enabled: false

sdk:
  enabled: true
  nameOverride: asset-tracker-sdk

cert-manager:
  enabled: false
  installCRDs: true

certManager:
  staging: true
  email: ""
  selfSigned: false
