apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: assets
spec:
  name: assets
  schema:
    postgres:
      primaryKey:
        - id
        - user_id
      columns:
        - name: id
          type: varchar(50)
          constraints:
            notNull: true
        - name: user_id
          type: uuid
          constraints:
            notNull: true
        - name: name
          type: varchar(255)
          constraints:
            notNull: true
        - name: description
          type: text
        - name: created_at
          type: timestamp
          default: "now()"
          constraints:
            notNull: true
        - name: updated_at
          type: timestamp
          default: "now()"
          constraints:
            notNull: true
        - name: source
          type: varchar(20)
          default: "manual"
          constraints:
            notNull: true
        - name: external_id
          type: text
        - name: access_token
          type: text
        - name: institution
          type: text
