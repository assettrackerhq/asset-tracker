apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: exchange_rates
spec:
  name: exchange_rates
  schema:
    postgres:
      primaryKey:
        - id
      columns:
        - name: id
          type: uuid
          default: "gen_random_uuid()"
          constraints:
            notNull: true
        - name: base_currency
          type: varchar(3)
          constraints:
            notNull: true
        - name: target_currency
          type: varchar(3)
          constraints:
            notNull: true
        - name: rate
          type: numeric(15,6)
          constraints:
            notNull: true
        - name: updated_at
          type: timestamp
          default: "now()"
          constraints:
            notNull: true
      indexes:
        - columns:
            - base_currency
            - target_currency
          name: idx_exchange_rates_unique
          isUnique: true
