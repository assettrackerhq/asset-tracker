apiVersion: schemas.schemahero.io/v1alpha4
kind: Table
metadata:
  name: verification-codes
spec:
  name: verification_codes
  schema:
    postgres:
      primaryKey:
        - id
      columns:
        - name: id
          type: uuid
          default: "gen_random_uuid()"
          constraints:
            notNull: true
        - name: user_id
          type: uuid
          constraints:
            notNull: true
        - name: code
          type: varchar(6)
          constraints:
            notNull: true
        - name: expires_at
          type: timestamp
          constraints:
            notNull: true
        - name: created_at
          type: timestamp
          default: "now()"
          constraints:
            notNull: true
