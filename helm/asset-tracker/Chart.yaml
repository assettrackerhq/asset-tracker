apiVersion: v2
name: asset-tracker
description: A personal asset tracker web application
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: "1.9.4"
    repository: "https://repo.helmforge.dev"
    condition: postgresql.enabled
  - name: cert-manager
    version: "v1.17.2"
    repository: "https://charts.jetstack.io"
    condition: cert-manager.enabled
  - name: ingress-nginx
    version: "4.12.1"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress-nginx.enabled
