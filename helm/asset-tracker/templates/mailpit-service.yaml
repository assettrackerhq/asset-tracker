{{- if .Values.mailpit.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "asset-tracker.fullname" . }}-mailpit
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: mailpit
spec:
  type: {{ .Values.mailpit.service.type | default "ClusterIP" }}
  ports:
    - port: 1025
      targetPort: smtp
      name: smtp
      {{- if and (eq (.Values.mailpit.service.type | default "ClusterIP") "NodePort") .Values.mailpit.service.smtpNodePort }}
      nodePort: {{ .Values.mailpit.service.smtpNodePort }}
      {{- end }}
    - port: 8025
      targetPort: http
      name: http
      {{- if and (eq (.Values.mailpit.service.type | default "ClusterIP") "NodePort") .Values.mailpit.service.httpNodePort }}
      nodePort: {{ .Values.mailpit.service.httpNodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/component: mailpit
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
