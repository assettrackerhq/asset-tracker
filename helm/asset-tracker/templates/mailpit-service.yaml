{{- if .Values.mailpit.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "asset-tracker.fullname" . }}-mailpit
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: mailpit
spec:
  type: ClusterIP
  ports:
    - port: 1025
      targetPort: smtp
      name: smtp
    - port: 8025
      targetPort: http
      name: http
  selector:
    app.kubernetes.io/component: mailpit
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
