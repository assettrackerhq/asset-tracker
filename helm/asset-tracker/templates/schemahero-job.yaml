apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "asset-tracker.fullname" . }}-schemahero
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: schemahero
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "asset-tracker.labels" . | nindent 8 }}
        app.kubernetes.io/component: schemahero
    spec:
      restartPolicy: OnFailure
      {{- include "asset-tracker.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-postgres
          image: {{ include "asset-tracker.proxyImage" (dict "root" . "image" "docker.io/library/busybox:1.37") }}
          command:
            - sh
            - -c
            - until nc -z {{ include "asset-tracker.postgresHost" . }} {{ include "asset-tracker.postgresPort" . }}; do echo "waiting for postgres"; sleep 2; done
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
        - name: copy-schemas
          image: {{ include "asset-tracker.proxyImage" (dict "root" . "image" "docker.io/library/busybox:1.37") }}
          command:
            - sh
            - -c
            - cp /schemas-cm/*.yaml /schemas/
          volumeMounts:
            - name: schema-cm
              mountPath: /schemas-cm
            - name: schema
              mountPath: /schemas
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 32Mi
      containers:
        - name: schemahero
          image: {{ include "asset-tracker.proxyImage" (dict "root" . "image" (printf "docker.io/%s:%s" .Values.schemahero.image.repository .Values.schemahero.image.tag)) }}
          resources:
            {{- toYaml .Values.schemahero.resources | nindent 12 }}
          command:
            - sh
            - -c
            - |
              /schemahero plan \
                --driver=postgres \
                --uri='{{ include "asset-tracker.databaseURL" . }}' \
                --spec-file=/schemas \
                --out=/tmp/ddl.sql && \
              /schemahero apply \
                --driver=postgres \
                --uri='{{ include "asset-tracker.databaseURL" . }}' \
                --ddl=/tmp/ddl.sql
          volumeMounts:
            - name: schema
              mountPath: /schemas
      volumes:
        - name: schema-cm
          configMap:
            name: {{ include "asset-tracker.fullname" . }}-schema
        - name: schema
          emptyDir: {}
