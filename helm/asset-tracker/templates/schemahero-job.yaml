apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "asset-tracker.fullname" . }}-schemahero
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: schemahero
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "asset-tracker.labels" . | nindent 8 }}
        app.kubernetes.io/component: schemahero
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          command:
            - sh
            - -c
            - until pg_isready -h {{ include "asset-tracker.fullname" . }}-postgres -U {{ .Values.postgres.user }}; do sleep 2; done
      containers:
        - name: schemahero
          image: "{{ .Values.schemahero.image.repository }}:{{ .Values.schemahero.image.tag }}"
          command:
            - /schemahero
            - apply
            - --driver=postgres
            - --uri={{ include "asset-tracker.databaseURL" . }}
            - --ddl=/schemas/schema.sql
          volumeMounts:
            - name: schema
              mountPath: /schemas
      volumes:
        - name: schema
          configMap:
            name: {{ include "asset-tracker.fullname" . }}-schema
