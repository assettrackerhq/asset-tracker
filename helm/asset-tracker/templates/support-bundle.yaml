apiVersion: v1
kind: Secret
metadata:
  name: {{ include "asset-tracker.fullname" . }}-support-bundle
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
    troubleshoot.sh/kind: support-bundle
type: Opaque
stringData:
  support-bundle-spec: |
    apiVersion: troubleshoot.sh/v1beta2
    kind: SupportBundle
    metadata:
      name: {{ include "asset-tracker.fullname" . }}
    spec:
      collectors:
        - clusterResources:
            namespaces:
              - {{ .Release.Namespace }}
        - logs:
            selector:
              - app.kubernetes.io/component=backend
              - app.kubernetes.io/instance={{ .Release.Name }}
            namespace: {{ .Release.Namespace }}
            name: backend/logs
            limits:
              maxLines: 10000
        - logs:
            selector:
              - app.kubernetes.io/component=frontend
              - app.kubernetes.io/instance={{ .Release.Name }}
            namespace: {{ .Release.Namespace }}
            name: frontend/logs
            limits:
              maxLines: 10000
        - logs:
            selector:
              - app.kubernetes.io/name=postgresql
              - app.kubernetes.io/instance={{ .Release.Name }}
            namespace: {{ .Release.Namespace }}
            name: postgresql/logs
            limits:
              maxLines: 10000
        - logs:
            selector:
              - app.kubernetes.io/name=replicated
            namespace: {{ .Release.Namespace }}
            name: replicated/logs
            limits:
              maxLines: 10000
        - http:
            collectorName: backend-health
            get:
              url: http://{{ include "asset-tracker.fullname" . }}-backend.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.port }}/api/health
              timeout: 5s
        - http:
            collectorName: frontend-health
            get:
              url: http://{{ include "asset-tracker.fullname" . }}-frontend.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.frontend.port }}/
              timeout: 5s
      analyzers:
        - deploymentStatus:
            name: {{ include "asset-tracker.fullname" . }}-backend
            namespace: {{ .Release.Namespace }}
            outcomes:
              - fail:
                  when: "absent"
                  message: The backend deployment is missing. The API is unavailable and users cannot access the application.
              - fail:
                  when: "< 1"
                  message: The backend deployment has no ready replicas. The API is down and all application functionality is unavailable.
              - pass:
                  message: The backend deployment is running.
        - deploymentStatus:
            name: {{ include "asset-tracker.fullname" . }}-frontend
            namespace: {{ .Release.Namespace }}
            outcomes:
              - fail:
                  when: "absent"
                  message: The frontend deployment is missing. The web UI is unavailable and users cannot access the application.
              - fail:
                  when: "< 1"
                  message: The frontend deployment has no ready replicas. The web UI is down and users cannot interact with the application.
              - pass:
                  message: The frontend deployment is running.
        {{- if .Values.postgresql.enabled }}
        - statefulsetStatus:
            name: {{ .Release.Name }}-postgresql
            namespace: {{ .Release.Namespace }}
            outcomes:
              - fail:
                  when: "absent"
                  message: The PostgreSQL StatefulSet is missing. The database is unavailable and the application cannot store or retrieve data.
              - fail:
                  when: "< 1"
                  message: The PostgreSQL StatefulSet has no ready replicas. The database is down and the application cannot process any requests.
              - pass:
                  message: The PostgreSQL StatefulSet is running.
        {{- end }}
        - storageClass:
            checkName: Default Storage Class
            outcomes:
              - fail:
                  when: "< 1"
                  message: No default storage class is configured. Persistent volumes cannot be provisioned automatically. Add a default storage class by annotating a StorageClass with storageclass.kubernetes.io/is-default-class=true.
              - pass:
                  message: A default storage class is configured.
        - nodeResources:
            checkName: Node Readiness
            outcomes:
              - fail:
                  when: "count() == 0"
                  message: No nodes were found in the cluster. The cluster may be unreachable or not properly configured.
              - fail:
                  when: "nodeCondition(Ready) == False"
                  message: One or more nodes are not in Ready state. Pods may fail to schedule or run. Check node status with kubectl get nodes and investigate NotReady nodes for disk pressure, memory pressure, or network issues.
              - pass:
                  message: All nodes are in Ready state.
        - textAnalyze:
            checkName: Backend Health Check
            fileName: backend-health.json
            regex: '"status":\s*"ok"'
            outcomes:
              - pass:
                  when: "true"
                  message: "Backend is healthy and responding normally."
              - fail:
                  when: "false"
                  message: "Backend is not healthy. The /api/health endpoint did not return status ok."
        - textAnalyze:
            checkName: Frontend Health Check
            fileName: frontend-health.json
            regex: '"status":\s*200'
            outcomes:
              - pass:
                  when: "true"
                  message: "Frontend is healthy and serving content."
              - fail:
                  when: "false"
                  message: "Frontend is not healthy. The service did not return HTTP 200."
