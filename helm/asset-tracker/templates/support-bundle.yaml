apiVersion: v1
kind: Secret
metadata:
  name: {{ include "asset-tracker.fullname" . }}-support-bundle
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
    troubleshoot.sh/kind: support-bundle
type: Opaque
stringData:
  support-bundle-spec: |
    apiVersion: troubleshoot.sh/v1beta2
    kind: SupportBundle
    metadata:
      name: {{ include "asset-tracker.fullname" . }}
    spec:
      collectors:
        - clusterResources:
            namespaces:
              - {{ .Release.Namespace }}
        - logs:
            selector:
              - app.kubernetes.io/component=backend
              - app.kubernetes.io/instance={{ .Release.Name }}
            namespace: {{ .Release.Namespace }}
            name: backend/logs
            limits:
              maxLines: 10000
        - logs:
            selector:
              - app.kubernetes.io/component=frontend
              - app.kubernetes.io/instance={{ .Release.Name }}
            namespace: {{ .Release.Namespace }}
            name: frontend/logs
            limits:
              maxLines: 10000
        - logs:
            selector:
              - app.kubernetes.io/name=postgresql
              - app.kubernetes.io/instance={{ .Release.Name }}
            namespace: {{ .Release.Namespace }}
            name: postgresql/logs
            limits:
              maxLines: 10000
        - logs:
            selector:
              - app.kubernetes.io/name=replicated
            namespace: {{ .Release.Namespace }}
            name: replicated/logs
            limits:
              maxLines: 10000
        - http:
            collectorName: backend-health
            get:
              url: http://{{ include "asset-tracker.fullname" . }}-backend.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.port }}/api/health
              timeout: 5s
        - http:
            collectorName: frontend-health
            get:
              url: http://{{ include "asset-tracker.fullname" . }}-frontend.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.frontend.port }}/
              timeout: 5s
      analyzers:
        - textAnalyze:
            checkName: Backend Health Check
            fileName: backend-health.json
            regex: '"status":\s*"ok"'
            outcomes:
              - pass:
                  when: "true"
                  message: "Backend is healthy and responding normally."
              - fail:
                  when: "false"
                  message: "Backend is not healthy. The /api/health endpoint did not return status ok."
        - textAnalyze:
            checkName: Frontend Health Check
            fileName: frontend-health.json
            regex: '"status":\s*200'
            outcomes:
              - pass:
                  when: "true"
                  message: "Frontend is healthy and serving content."
              - fail:
                  when: "false"
                  message: "Frontend is not healthy. The service did not return HTTP 200."
