apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "asset-tracker.fullname" . }}-backend
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
---
# Role for creating and monitoring support bundle Jobs
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "asset-tracker.fullname" . }}-support-bundle-jobs
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "asset-tracker.fullname" . }}-support-bundle-jobs
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "asset-tracker.fullname" . }}-support-bundle-jobs
subjects:
  - kind: ServiceAccount
    name: {{ include "asset-tracker.fullname" . }}-backend
    namespace: {{ .Release.Namespace }}
---
# ClusterRole for support bundle collection (used by the Job pod)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "asset-tracker.fullname" . }}-support-bundle
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "pods/log", "services", "endpoints", "configmaps", "secrets", "events", "nodes", "persistentvolumeclaims", "persistentvolumes", "resourcequotas", "limitranges", "serviceaccounts"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets", "daemonsets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "asset-tracker.fullname" . }}-support-bundle
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "asset-tracker.fullname" . }}-support-bundle
subjects:
  - kind: ServiceAccount
    name: {{ include "asset-tracker.fullname" . }}-backend
    namespace: {{ .Release.Namespace }}
