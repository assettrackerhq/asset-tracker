apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "asset-tracker.fullname" . }}-schema
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
data:
  {{- range $path, $_ := .Files.Glob "tables/*.yaml" }}
  {{ base $path }}: |
    {{- $.Files.Get $path | nindent 4 }}
  {{- end }}
