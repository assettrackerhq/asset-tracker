apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "asset-tracker.fullname" . }}-backend
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "asset-tracker.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- include "asset-tracker.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "asset-tracker.fullname" . }}-backend
      initContainers:
        - name: wait-for-db
          image: {{ include "asset-tracker.proxyImage" (dict "root" . "image" "docker.io/library/busybox:1.37") }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for database at {{ include "asset-tracker.postgresHost" . }}:{{ include "asset-tracker.postgresPort" . }}..."
              until nc -z {{ include "asset-tracker.postgresHost" . }} {{ include "asset-tracker.postgresPort" . }}; do
                echo "Database not ready, retrying in 2s..."
                sleep 2
              done
              echo "Database is reachable."
      containers:
        - name: backend
          image: {{ include "asset-tracker.proxyImage" (dict "root" . "image" (printf "docker.io/%s:%s" .Values.backend.image.repository .Values.backend.image.tag)) }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: DATABASE_URL
              value: {{ include "asset-tracker.databaseURL" . }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "asset-tracker.fullname" . }}-backend
                  key: jwt-secret
            - name: PORT
              value: {{ .Values.backend.port | quote }}
            - name: ANALYTICS_ENABLED
              value: {{ .Values.backend.analyticsEnabled | quote }}
            - name: REPLICATED_SDK_ENDPOINT
              value: {{ .Values.backend.metrics.sdkEndpoint | quote }}
            - name: METRICS_INTERVAL
              value: {{ .Values.backend.metrics.interval | quote }}
            - name: SMTP_HOST
              {{- if and .Values.mailpit.enabled (eq .Values.smtp.host "") }}
              value: {{ include "asset-tracker.fullname" . }}-mailpit
              {{- else }}
              value: {{ .Values.smtp.host | quote }}
              {{- end }}
            - name: SMTP_PORT
              {{- if and .Values.mailpit.enabled (eq .Values.smtp.host "") }}
              value: "1025"
              {{- else }}
              value: {{ .Values.smtp.port | quote }}
              {{- end }}
            - name: SMTP_FROM
              value: {{ .Values.smtp.from | quote }}
            - name: SMTP_USERNAME
              value: {{ .Values.smtp.username | quote }}
            - name: SMTP_PASSWORD
              value: {{ .Values.smtp.password | quote }}
            - name: SUPPORT_BUNDLE_IMAGE
              value: {{ include "asset-tracker.proxyImage" (dict "root" . "image" (printf "docker.io/%s:%s" .Values.supportBundle.image.repository .Values.supportBundle.image.tag)) | quote }}
            - name: SUPPORT_BUNDLE_SERVICE_ACCOUNT
              value: {{ include "asset-tracker.fullname" . }}-backend
            - name: SUPPORT_BUNDLE_IMAGE_PULL_SECRETS
              value: {{ include "asset-tracker.imagePullSecretNames" . | quote }}
            - name: PLAID_ENABLED
              value: {{ .Values.backend.plaid.enabled | quote }}
            - name: PLAID_CLIENT_ID
              value: {{ .Values.backend.plaid.clientId | quote }}
            - name: PLAID_SECRET
              value: {{ .Values.backend.plaid.secret | quote }}
            - name: PLAID_ENVIRONMENT
              value: {{ .Values.backend.plaid.environment | quote }}
            - name: TELLER_ENABLED
              value: {{ .Values.backend.teller.enabled | quote }}
            - name: TELLER_APPLICATION_ID
              value: {{ .Values.backend.teller.applicationId | quote }}
            - name: TELLER_ENVIRONMENT
              value: {{ .Values.backend.teller.environment | quote }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
