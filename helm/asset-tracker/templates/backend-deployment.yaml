apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "asset-tracker.fullname" . }}-backend
  labels:
    {{- include "asset-tracker.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "asset-tracker.labels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- include "asset-tracker.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-db
          image: {{ include "asset-tracker.proxyImage" (dict "root" . "image" "docker.io/library/busybox:1.37") }}
          command:
            - sh
            - -c
            - |
              echo "Waiting for database at {{ include "asset-tracker.postgresHost" . }}:{{ include "asset-tracker.postgresPort" . }}..."
              until nc -z {{ include "asset-tracker.postgresHost" . }} {{ include "asset-tracker.postgresPort" . }}; do
                echo "Database not ready, retrying in 2s..."
                sleep 2
              done
              echo "Database is reachable."
      containers:
        - name: backend
          image: {{ include "asset-tracker.proxyImage" (dict "root" . "image" (printf "docker.io/%s:%s" .Values.backend.image.repository .Values.backend.image.tag)) }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: DATABASE_URL
              value: {{ include "asset-tracker.databaseURL" . }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "asset-tracker.fullname" . }}-backend
                  key: jwt-secret
            - name: PORT
              value: {{ .Values.backend.port | quote }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
