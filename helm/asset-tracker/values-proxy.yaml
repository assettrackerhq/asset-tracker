# Overlay values for proxying all images through the Replicated proxy registry.
# Usage: helm install ... -f values.yaml -f values-proxy.yaml
#
# This file overrides subchart image values to route through the proxy.
# The main chart's own images (backend, frontend, schemahero, init containers)
# are handled automatically via global.proxy in values.yaml.

global:
  proxy:
    enabled: true
    domain: proxy.assettracker.tech
    appSlug: assettracker

postgresql:
  image:
    repository: proxy.assettracker.tech/proxy/assettracker/docker.io/library/postgres
    tag: "18.3-trixie"

# Note: ingress-nginx and cert-manager are NOT proxied because their
# pre-install hooks run before the Replicated SDK creates the pull secret.
# These images are public (registry.k8s.io, quay.io) and don't need proxying.
