name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_VERSION: 0.1.0-${{ github.run_id }}.${{ github.run_attempt }}
  APP_SLUG: ${{ secrets.REPLICATED_APP_SLUG }}
  REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      channel-slug: ${{ steps.create-release.outputs.channel-slug }}
      release-sequence: ${{ steps.create-release.outputs.release-sequence }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        id: package
        run: |
          helm repo add helmforge https://repo.helmforge.dev
          helm repo add jetstack https://charts.jetstack.io
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          sed -i "s/^version:.*/version: ${{ env.APP_VERSION }}/" helm/asset-tracker/Chart.yaml
          helm dependency build helm/asset-tracker
          helm package helm/asset-tracker --destination helm/
          echo "chart=$(ls helm/asset-tracker-*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Prepare release directory
        run: |
          mkdir -p release
          cp helm/asset-tracker-*.tgz release/
          cp replicated/embedded-cluster-config.yaml release/
          cp replicated/helmchart-asset-tracker.yaml release/
          cp replicated/application.yaml release/
          cp helm/asset-tracker/charts/ingress-nginx-4.12.1.tgz release/
          sed -i "s/chartVersion: .*/chartVersion: ${{ env.APP_VERSION }}/" release/helmchart-asset-tracker.yaml

      - name: Create release
        id: create-release
        uses: replicatedhq/replicated-actions/create-release@v1.20.0
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          yaml-dir: release
          promote-channel: ci-${{ github.run_id }}
          version: ${{ env.APP_VERSION }}

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: ${{ steps.package.outputs.chart }}

  # ─── E2E Tests (k3s cluster + Helm install) ───────────────────────
  e2e-tests:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}
      customer-id: ${{ steps.create-customer.outputs.customer-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create customer
        id: create-customer
        uses: replicatedhq/replicated-actions/create-customer@v1.20.0
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          customer-name: ci-${{ github.run_id }}
          customer-email: ci-${{ github.run_id }}@example.com
          channel-slug: ${{ needs.create-release.outputs.channel-slug }}
          is-kots-install-enabled: "false"
          expires-in: 1

      - name: Create cluster
        id: create-cluster
        uses: replicatedhq/replicated-actions/create-cluster@v1.20.0
        with:
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          kubernetes-distribution: k3s
          cluster-name: ci-${{ github.run_id }}
          ttl: 1h
          export-kubeconfig: "true"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy the app
        uses: replicatedhq/replicated-actions/helm-install@v1.20.0
        with:
          kubeconfig: ${{ steps.create-cluster.outputs.cluster-kubeconfig }}
          helm-path: helm
          registry-username: ci-${{ github.run_id }}@example.com
          registry-password: ${{ steps.create-customer.outputs.license-id }}
          chart: oci://registry.replicated.com/${{ env.APP_SLUG }}/${{ needs.create-release.outputs.channel-slug }}/asset-tracker
          name: asset-tracker
          version: ${{ env.APP_VERSION }}
          namespace: default
          values: |
            global:
              proxy:
                enabled: true
                domain: proxy.assettracker.tech
                appSlug: assettracker
            ingress:
              enabled: true
              className: nginx
            ingress-nginx:
              enabled: true
              imagePullSecrets:
                - name: enterprise-pull-secret
              global:
                image:
                  registry: proxy.assettracker.tech/proxy/assettracker/registry.k8s.io
              controller:
                service:
                  type: NodePort
                  nodePorts:
                    http: 30080
            postgresql:
              image:
                repository: proxy.assettracker.tech/proxy/assettracker/docker.io/library/postgres
                tag: "18.3-trixie"
              imagePullSecrets:
                - name: enterprise-pull-secret
            mailpit:
              enabled: true

      - name: Expose port
        id: expose-port
        uses: replicatedhq/replicated-actions/expose-port@v1.20.0
        with:
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}
          port: 30080
          protocols: https

      - name: Wait for Mailpit pod to be ready
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/component=mailpit --timeout=120s
          kubectl get pods -l app.kubernetes.io/component=mailpit

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: https://${{ steps.expose-port.outputs.hostname }}
          MAILPIT_URL: https://${{ steps.expose-port.outputs.hostname }}/mailpit

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Collect support bundle
        if: always()
        run: |
          curl -L https://github.com/replicatedhq/troubleshoot/releases/latest/download/support-bundle_linux_amd64.tar.gz | tar xzf -
          ./support-bundle --load-cluster-specs --interactive=false -o support-bundle 2>&1 || true

      - name: Upload support bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: support-bundle
          path: support-bundle.tar.gz

  # ─── Embedded Cluster Install Test ────────────────────────────────
  ec-install-test:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      vm-id: ${{ steps.create-vm.outputs.vm-id }}
      customer-id: ${{ steps.create-customer.outputs.customer-id }}
      channel-slug: ${{ steps.create-channel.outputs.channel-slug }}
    steps:
      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL -o replicated.tar.gz
          mkdir -p /tmp/replicated-cli
          tar xzf replicated.tar.gz -C /tmp/replicated-cli replicated
          sudo mv /tmp/replicated-cli/replicated /usr/local/bin/

      - name: Create channel and promote release
        id: create-channel
        run: |
          CHANNEL_OUTPUT=$(replicated channel create \
            --app "$APP_SLUG" \
            --name "ec-${{ github.run_id }}" \
            --output json)
          CHANNEL_SLUG=$(echo "$CHANNEL_OUTPUT" | jq -r '.[0].channelSlug')
          echo "channel-slug=$CHANNEL_SLUG" >> "$GITHUB_OUTPUT"
          replicated release promote \
            --app "$APP_SLUG" \
            "${{ needs.create-release.outputs.release-sequence }}" \
            "ec-${{ github.run_id }}" \
            --version "${{ env.APP_VERSION }}"

      - name: Create customer with Embedded Cluster entitlement
        id: create-customer
        run: |
          OUTPUT=$(replicated customer create \
            --app "$APP_SLUG" \
            --name "ec-${{ github.run_id }}" \
            --email "ec-${{ github.run_id }}@example.com" \
            --channel "ec-${{ github.run_id }}" \
            --embedded-cluster-download \
            --expires-in 24h \
            --type test \
            --output json)
          CUSTOMER_ID=$(echo "$OUTPUT" | jq -r '.id')
          LICENSE_ID=$(echo "$OUTPUT" | jq -r '.installationId')
          echo "::add-mask::$LICENSE_ID"
          echo "customer-id=$CUSTOMER_ID" >> "$GITHUB_OUTPUT"
          echo "license-id=$LICENSE_ID" >> "$GITHUB_OUTPUT"

      - name: Download license
        run: |
          replicated customer download-license \
            --app "$APP_SLUG" \
            --customer "${{ steps.create-customer.outputs.customer-id }}" \
            --output license.yaml

      - name: Generate SSH key pair
        id: ssh-key
        run: |
          ssh-keygen -t ed25519 -f ec-ci-key -N "" -q
          SSH_USERNAME=$(awk '{print $3}' ec-ci-key.pub | cut -d'@' -f1)
          echo "username=$SSH_USERNAME" >> "$GITHUB_OUTPUT"

      - name: Create VM
        id: create-vm
        run: |
          OUTPUT=$(replicated vm create \
            --distribution ubuntu \
            --version 22.04 \
            --name "ec-${{ github.run_id }}" \
            --disk 50 \
            --ttl 1h \
            --ssh-public-key ec-ci-key.pub \
            --output json)
          VM_ID=$(echo "$OUTPUT" | jq -r '.[0].id')
          echo "vm-id=$VM_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for VM to be running
        timeout-minutes: 10
        run: |
          VM_ID="${{ steps.create-vm.outputs.vm-id }}"
          for i in $(seq 1 60); do
            STATUS=$(replicated vm ls --output json | jq -r ".[] | select(.id == \"$VM_ID\") | .status")
            echo "VM status: $STATUS (attempt $i/60)"
            if [ "$STATUS" = "running" ]; then
              echo "VM is running"
              exit 0
            fi
            sleep 10
          done
          echo "VM did not reach running state in time"
          exit 1

      - name: Parse SSH endpoint
        id: ssh
        run: |
          ENDPOINT=$(replicated vm ssh-endpoint "${{ steps.create-vm.outputs.vm-id }}" --username "${{ steps.ssh-key.outputs.username }}")
          USER_HOST_PORT=$(echo "$ENDPOINT" | sed 's|ssh://||')
          SSH_USER=$(echo "$USER_HOST_PORT" | cut -d'@' -f1)
          HOST_PORT=$(echo "$USER_HOST_PORT" | cut -d'@' -f2)
          SSH_HOST=$(echo "$HOST_PORT" | cut -d':' -f1)
          SSH_PORT=$(echo "$HOST_PORT" | cut -d':' -f2)
          echo "user=$SSH_USER" >> "$GITHUB_OUTPUT"
          echo "host=$SSH_HOST" >> "$GITHUB_OUTPUT"
          echo "port=$SSH_PORT" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile /dev/null" >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          chmod 600 ec-ci-key

      - name: Copy license to VM
        run: |
          scp -i ec-ci-key -P "${{ steps.ssh.outputs.port }}" \
            license.yaml "${{ steps.ssh.outputs.user }}@${{ steps.ssh.outputs.host }}:~/license.yaml"

      - name: Install Embedded Cluster on VM
        timeout-minutes: 15
        run: |
          ssh -i ec-ci-key -p "${{ steps.ssh.outputs.port }}" \
            "${{ steps.ssh.outputs.user }}@${{ steps.ssh.outputs.host }}" << 'INSTALL_SCRIPT'
          set -euo pipefail
          LICENSE_ID=$(grep licenseID ~/license.yaml | awk '{print $2}')
          curl -fL -o assettracker.tgz \
            "https://replicated.app/embedded/assettracker/ec-${{ github.run_id }}" \
            -H "Authorization: $LICENSE_ID"
          tar xzf assettracker.tgz
          sudo ./assettracker install \
            --license ~/license.yaml \
            --headless \
            --installer-password changeme \
            --ignore-host-preflights \
            --yes
          INSTALL_SCRIPT

      - name: Verify all pods are Running
        timeout-minutes: 5
        run: |
          ssh -i ec-ci-key -p "${{ steps.ssh.outputs.port }}" \
            "${{ steps.ssh.outputs.user }}@${{ steps.ssh.outputs.host }}" << 'VERIFY_SCRIPT'
          set -euo pipefail
          sudo assettracker shell -c "k0s kubectl get pods -A"
          sudo assettracker shell -c "k0s kubectl wait --for=condition=ready pods --all --all-namespaces --field-selector=status.phase!=Succeeded --timeout=300s"
          echo "--- Final pod status ---"
          sudo assettracker shell -c "k0s kubectl get pods -A"
          VERIFY_SCRIPT

      - name: Expose app port
        id: expose-port
        run: |
          OUTPUT=$(replicated vm port expose "${{ steps.create-vm.outputs.vm-id }}" \
            --port 30080 \
            --protocol https \
            --output json)
          HOSTNAME=$(echo "$OUTPUT" | jq -r '.hostname')
          if [ -z "$HOSTNAME" ] || [ "$HOSTNAME" = "null" ]; then
            echo "ERROR: Could not determine hostname from port expose output"
            echo "$OUTPUT"
            exit 1
          fi
          echo "hostname=$HOSTNAME" >> "$GITHUB_OUTPUT"

      - name: Verify app is accessible
        run: |
          BASE_URL="https://${{ steps.expose-port.outputs.hostname }}"
          echo "Testing health endpoint..."
          curl -sf --retry 10 --retry-delay 5 --max-time 10 "${BASE_URL}/api/health"
          echo ""
          echo "Testing login page..."
          curl -sf --retry 5 --retry-delay 5 --max-time 10 -o /dev/null -w "%{http_code}" "${BASE_URL}/login"
          echo ""
          echo "App is accessible!"

  # ─── Embedded Cluster Upgrade Test ────────────────────────────────
  ec-upgrade-test:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      vm-id: ${{ steps.create-vm.outputs.vm-id }}
      customer-id: ${{ steps.create-customer.outputs.customer-id }}
      channel-slug: ${{ steps.create-channel.outputs.channel-slug }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL -o replicated.tar.gz
          mkdir -p /tmp/replicated-cli
          tar xzf replicated.tar.gz -C /tmp/replicated-cli replicated
          sudo mv /tmp/replicated-cli/replicated /usr/local/bin/

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create channel
        id: create-channel
        run: |
          CHANNEL_OUTPUT=$(replicated channel create \
            --app "$APP_SLUG" \
            --name "ec-upgrade-${{ github.run_id }}" \
            --output json)
          CHANNEL_SLUG=$(echo "$CHANNEL_OUTPUT" | jq -r '.[0].channelSlug')
          echo "channel-slug=$CHANNEL_SLUG" >> "$GITHUB_OUTPUT"

      - name: Package and create v1 release
        run: |
          helm repo add helmforge https://repo.helmforge.dev
          helm repo add jetstack https://charts.jetstack.io
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          V1_VERSION="${{ env.APP_VERSION }}-v1"
          sed -i "s/^version:.*/version: $V1_VERSION/" helm/asset-tracker/Chart.yaml
          helm dependency build helm/asset-tracker
          helm package helm/asset-tracker --destination helm/
          mkdir -p release-v1
          cp helm/asset-tracker-${V1_VERSION}.tgz release-v1/
          cp replicated/embedded-cluster-config.yaml release-v1/
          cp replicated/helmchart-asset-tracker.yaml release-v1/
          cp replicated/application.yaml release-v1/
          cp helm/asset-tracker/charts/ingress-nginx-4.12.1.tgz release-v1/
          sed -i "s/chartVersion: .*/chartVersion: $V1_VERSION/" release-v1/helmchart-asset-tracker.yaml

      - name: Create and promote v1 release
        uses: replicatedhq/replicated-actions/create-release@v1.20.0
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          yaml-dir: release-v1
          promote-channel: ec-upgrade-${{ github.run_id }}
          version: ${{ env.APP_VERSION }}-v1

      - name: Create customer
        id: create-customer
        run: |
          OUTPUT=$(replicated customer create \
            --app "$APP_SLUG" \
            --name "ec-upgrade-${{ github.run_id }}" \
            --email "ec-upgrade-${{ github.run_id }}@example.com" \
            --channel "ec-upgrade-${{ github.run_id }}" \
            --embedded-cluster-download \
            --expires-in 24h \
            --type test \
            --output json)
          CUSTOMER_ID=$(echo "$OUTPUT" | jq -r '.id')
          LICENSE_ID=$(echo "$OUTPUT" | jq -r '.installationId')
          echo "::add-mask::$LICENSE_ID"
          echo "customer-id=$CUSTOMER_ID" >> "$GITHUB_OUTPUT"
          echo "license-id=$LICENSE_ID" >> "$GITHUB_OUTPUT"

      - name: Download license
        run: |
          replicated customer download-license \
            --app "$APP_SLUG" \
            --customer "${{ steps.create-customer.outputs.customer-id }}" \
            --output license.yaml

      - name: Generate SSH key pair
        id: ssh-key
        run: |
          ssh-keygen -t ed25519 -f ec-ci-key -N "" -q
          SSH_USERNAME=$(awk '{print $3}' ec-ci-key.pub | cut -d'@' -f1)
          echo "username=$SSH_USERNAME" >> "$GITHUB_OUTPUT"

      - name: Create VM
        id: create-vm
        run: |
          OUTPUT=$(replicated vm create \
            --distribution ubuntu \
            --version 22.04 \
            --name "ec-upgrade-${{ github.run_id }}" \
            --disk 50 \
            --ttl 2h \
            --ssh-public-key ec-ci-key.pub \
            --output json)
          VM_ID=$(echo "$OUTPUT" | jq -r '.[0].id')
          echo "vm-id=$VM_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for VM to be running
        timeout-minutes: 10
        run: |
          VM_ID="${{ steps.create-vm.outputs.vm-id }}"
          for i in $(seq 1 60); do
            STATUS=$(replicated vm ls --output json | jq -r ".[] | select(.id == \"$VM_ID\") | .status")
            echo "VM status: $STATUS (attempt $i/60)"
            if [ "$STATUS" = "running" ]; then
              echo "VM is running"
              exit 0
            fi
            sleep 10
          done
          echo "VM did not reach running state in time"
          exit 1

      - name: Parse SSH endpoint
        id: ssh
        run: |
          ENDPOINT=$(replicated vm ssh-endpoint "${{ steps.create-vm.outputs.vm-id }}" --username "${{ steps.ssh-key.outputs.username }}")
          USER_HOST_PORT=$(echo "$ENDPOINT" | sed 's|ssh://||')
          SSH_USER=$(echo "$USER_HOST_PORT" | cut -d'@' -f1)
          HOST_PORT=$(echo "$USER_HOST_PORT" | cut -d'@' -f2)
          SSH_HOST=$(echo "$HOST_PORT" | cut -d':' -f1)
          SSH_PORT=$(echo "$HOST_PORT" | cut -d':' -f2)
          echo "user=$SSH_USER" >> "$GITHUB_OUTPUT"
          echo "host=$SSH_HOST" >> "$GITHUB_OUTPUT"
          echo "port=$SSH_PORT" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile /dev/null" >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          chmod 600 ec-ci-key

      - name: Copy license to VM
        run: |
          scp -i ec-ci-key -P "${{ steps.ssh.outputs.port }}" \
            license.yaml "${{ steps.ssh.outputs.user }}@${{ steps.ssh.outputs.host }}:~/license.yaml"

      - name: Install Embedded Cluster v1
        timeout-minutes: 15
        run: |
          ssh -i ec-ci-key -p "${{ steps.ssh.outputs.port }}" \
            "${{ steps.ssh.outputs.user }}@${{ steps.ssh.outputs.host }}" << 'INSTALL_SCRIPT'
          set -euo pipefail
          LICENSE_ID=$(grep licenseID ~/license.yaml | awk '{print $2}')
          curl -fL -o assettracker.tgz \
            "https://replicated.app/embedded/assettracker/ec-upgrade-${{ github.run_id }}" \
            -H "Authorization: $LICENSE_ID"
          tar xzf assettracker.tgz
          sudo ./assettracker install \
            --license ~/license.yaml \
            --headless \
            --installer-password changeme \
            --ignore-host-preflights \
            --yes
          INSTALL_SCRIPT

      - name: Verify pods after install
        timeout-minutes: 5
        run: |
          ssh -i ec-ci-key -p "${{ steps.ssh.outputs.port }}" \
            "${{ steps.ssh.outputs.user }}@${{ steps.ssh.outputs.host }}" << 'VERIFY_SCRIPT'
          set -euo pipefail
          sudo assettracker shell -c "k0s kubectl wait --for=condition=ready pods --all --all-namespaces --field-selector=status.phase!=Succeeded --timeout=300s"
          echo "--- Pod status after v1 install ---"
          sudo assettracker shell -c "k0s kubectl get pods -A"
          VERIFY_SCRIPT

      - name: Expose app port
        id: expose-port
        run: |
          OUTPUT=$(replicated vm port expose "${{ steps.create-vm.outputs.vm-id }}" \
            --port 30080 \
            --protocol https \
            --output json)
          HOSTNAME=$(echo "$OUTPUT" | jq -r '.hostname')
          if [ -z "$HOSTNAME" ] || [ "$HOSTNAME" = "null" ]; then
            echo "ERROR: Could not determine hostname"
            echo "$OUTPUT"
            exit 1
          fi
          echo "hostname=$HOSTNAME" >> "$GITHUB_OUTPUT"

      - name: Run seed tests (create data on v1)
        run: npx playwright test --config e2e/playwright.ec-upgrade.config.mjs ec-upgrade-seed.spec.mjs
        env:
          BASE_URL: https://${{ steps.expose-port.outputs.hostname }}
          MAILPIT_URL: https://${{ steps.expose-port.outputs.hostname }}/mailpit

      - name: Promote main release as v2
        run: |
          replicated release promote \
            --app "$APP_SLUG" \
            "${{ needs.create-release.outputs.release-sequence }}" \
            "ec-upgrade-${{ github.run_id }}" \
            --version "${{ env.APP_VERSION }}"

      - name: Upgrade Embedded Cluster to v2
        timeout-minutes: 15
        run: |
          ssh -i ec-ci-key -p "${{ steps.ssh.outputs.port }}" \
            "${{ steps.ssh.outputs.user }}@${{ steps.ssh.outputs.host }}" << 'UPGRADE_SCRIPT'
          set -euo pipefail
          LICENSE_ID=$(grep licenseID ~/license.yaml | awk '{print $2}')
          curl -fL -o assettracker-v2.tgz \
            "https://replicated.app/embedded/assettracker/ec-upgrade-${{ github.run_id }}" \
            -H "Authorization: $LICENSE_ID"
          tar xzf assettracker-v2.tgz
          sudo ./assettracker upgrade \
            --license ~/license.yaml \
            --headless \
            --yes
          UPGRADE_SCRIPT

      - name: Verify pods after upgrade
        timeout-minutes: 5
        run: |
          ssh -i ec-ci-key -p "${{ steps.ssh.outputs.port }}" \
            "${{ steps.ssh.outputs.user }}@${{ steps.ssh.outputs.host }}" << 'VERIFY_SCRIPT'
          set -euo pipefail
          sudo assettracker shell -c "k0s kubectl wait --for=condition=ready pods --all --all-namespaces --field-selector=status.phase!=Succeeded --timeout=300s"
          echo "--- Pod status after v2 upgrade ---"
          sudo assettracker shell -c "k0s kubectl get pods -A"
          VERIFY_SCRIPT

      - name: Run verify tests (check data persists after upgrade)
        run: npx playwright test --config e2e/playwright.ec-upgrade.config.mjs ec-upgrade-verify.spec.mjs
        env:
          BASE_URL: https://${{ steps.expose-port.outputs.hostname }}

  # ─── Embedded Cluster Air Gap Test ────────────────────────────────
  ec-airgap-test:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      vm-id: ${{ steps.create-vm.outputs.vm-id }}
      customer-id: ${{ steps.create-customer.outputs.customer-id }}
      channel-slug: ${{ steps.create-channel.outputs.channel-slug }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL -o replicated.tar.gz
          mkdir -p /tmp/replicated-cli
          tar xzf replicated.tar.gz -C /tmp/replicated-cli replicated
          sudo mv /tmp/replicated-cli/replicated /usr/local/bin/

      - name: Create channel with airgap enabled
        id: create-channel
        run: |
          CHANNEL_OUTPUT=$(replicated channel create \
            --app "$APP_SLUG" \
            --name "ec-airgap-${{ github.run_id }}" \
            --output json)
          CHANNEL_SLUG=$(echo "$CHANNEL_OUTPUT" | jq -r '.[0].channelSlug')
          CHANNEL_ID=$(echo "$CHANNEL_OUTPUT" | jq -r '.[0].id')
          echo "channel-slug=$CHANNEL_SLUG" >> "$GITHUB_OUTPUT"
          echo "channel-id=$CHANNEL_ID" >> "$GITHUB_OUTPUT"
          # Enable airgap builds on this channel
          APP_ID=$(replicated app ls --output json | jq -r ".[] | select(.app.slug == \"$APP_SLUG\") | .app.id")
          replicated api put "/v3/app/${APP_ID}/channel/${CHANNEL_ID}" \
            --body "{\"autoAirgapBuildsValue\": 1, \"name\": \"ec-airgap-${{ github.run_id }}\"}"

      - name: Promote release to airgap channel and wait for bundle
        id: promote-airgap
        run: |
          replicated release promote \
            --app "$APP_SLUG" \
            "${{ needs.create-release.outputs.release-sequence }}" \
            "ec-airgap-${{ github.run_id }}" \
            --version "${{ env.APP_VERSION }}"
          # Wait for airgap build to complete
          APP_ID=$(replicated app ls --output json | jq -r ".[] | select(.app.slug == \"$APP_SLUG\") | .app.id")
          CHANNEL_ID="${{ steps.create-channel.outputs.channel-id }}"
          echo "Waiting for airgap build to complete..."
          for i in $(seq 1 60); do
            RESPONSE=$(replicated api get "/v3/app/${APP_ID}/channel/${CHANNEL_ID}" 2>/dev/null || true)
            AIRGAP_STATUS=$(echo "$RESPONSE" | jq -r '.channel.releaseSequence // empty')
            AIRGAP_BUILD=$(echo "$RESPONSE" | jq -r '.channel.airgapBuildStatus // empty')
            echo "Airgap build status: $AIRGAP_BUILD (attempt $i/60)"
            if [ "$AIRGAP_BUILD" = "success" ]; then
              echo "Airgap build completed successfully"
              break
            fi
            if [ "$AIRGAP_BUILD" = "error" ] || [ "$AIRGAP_BUILD" = "failed" ]; then
              echo "Airgap build failed"
              exit 1
            fi
            sleep 30
          done

      - name: Create customer with airgap entitlement
        id: create-customer
        run: |
          OUTPUT=$(replicated customer create \
            --app "$APP_SLUG" \
            --name "ec-airgap-${{ github.run_id }}" \
            --email "ec-airgap-${{ github.run_id }}@example.com" \
            --channel "ec-airgap-${{ github.run_id }}" \
            --embedded-cluster-download \
            --airgap-download-enabled \
            --expires-in 24h \
            --type test \
            --output json)
          CUSTOMER_ID=$(echo "$OUTPUT" | jq -r '.id')
          LICENSE_ID=$(echo "$OUTPUT" | jq -r '.installationId')
          echo "::add-mask::$LICENSE_ID"
          echo "customer-id=$CUSTOMER_ID" >> "$GITHUB_OUTPUT"
          echo "license-id=$LICENSE_ID" >> "$GITHUB_OUTPUT"

      - name: Download license
        run: |
          replicated customer download-license \
            --app "$APP_SLUG" \
            --customer "${{ steps.create-customer.outputs.customer-id }}" \
            --output license.yaml

      - name: Download airgap bundle
        run: |
          LICENSE_ID="${{ steps.create-customer.outputs.license-id }}"
          curl -fL -o assettracker.airgap \
            "https://replicated.app/embedded/assettracker/ec-airgap-${{ github.run_id }}?airgap=true" \
            -H "Authorization: $LICENSE_ID"
          ls -lh assettracker.airgap

      - name: Download EC installer for airgap
        run: |
          LICENSE_ID="${{ steps.create-customer.outputs.license-id }}"
          curl -fL -o assettracker.tgz \
            "https://replicated.app/embedded/assettracker/ec-airgap-${{ github.run_id }}" \
            -H "Authorization: $LICENSE_ID"
          ls -lh assettracker.tgz

      - name: Generate SSH key pair
        id: ssh-key
        run: |
          ssh-keygen -t ed25519 -f ec-ci-key -N "" -q
          SSH_USERNAME=$(awk '{print $3}' ec-ci-key.pub | cut -d'@' -f1)
          echo "username=$SSH_USERNAME" >> "$GITHUB_OUTPUT"

      - name: Create VM
        id: create-vm
        run: |
          OUTPUT=$(replicated vm create \
            --distribution ubuntu \
            --version 22.04 \
            --name "ec-airgap-${{ github.run_id }}" \
            --disk 100 \
            --ttl 2h \
            --ssh-public-key ec-ci-key.pub \
            --output json)
          VM_ID=$(echo "$OUTPUT" | jq -r '.[0].id')
          echo "vm-id=$VM_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for VM to be running
        timeout-minutes: 10
        run: |
          VM_ID="${{ steps.create-vm.outputs.vm-id }}"
          for i in $(seq 1 60); do
            STATUS=$(replicated vm ls --output json | jq -r ".[] | select(.id == \"$VM_ID\") | .status")
            echo "VM status: $STATUS (attempt $i/60)"
            if [ "$STATUS" = "running" ]; then
              echo "VM is running"
              exit 0
            fi
            sleep 10
          done
          echo "VM did not reach running state in time"
          exit 1

      - name: Parse SSH endpoint
        id: ssh
        run: |
          ENDPOINT=$(replicated vm ssh-endpoint "${{ steps.create-vm.outputs.vm-id }}" --username "${{ steps.ssh-key.outputs.username }}")
          USER_HOST_PORT=$(echo "$ENDPOINT" | sed 's|ssh://||')
          SSH_USER=$(echo "$USER_HOST_PORT" | cut -d'@' -f1)
          HOST_PORT=$(echo "$USER_HOST_PORT" | cut -d'@' -f2)
          SSH_HOST=$(echo "$HOST_PORT" | cut -d':' -f1)
          SSH_PORT=$(echo "$HOST_PORT" | cut -d':' -f2)
          echo "user=$SSH_USER" >> "$GITHUB_OUTPUT"
          echo "host=$SSH_HOST" >> "$GITHUB_OUTPUT"
          echo "port=$SSH_PORT" >> "$GITHUB_OUTPUT"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "UserKnownHostsFile /dev/null" >> ~/.ssh/config
          chmod 600 ~/.ssh/config
          chmod 600 ec-ci-key

      - name: Transfer files to VM
        run: |
          scp -i ec-ci-key -P "${{ steps.ssh.outputs.port }}" \
            license.yaml assettracker.tgz assettracker.airgap \
            "${{ steps.ssh.outputs.user }}@${{ steps.ssh.outputs.host }}:~/"

      - name: Install Embedded Cluster (airgap)
        timeout-minutes: 20
        run: |
          ssh -i ec-ci-key -p "${{ steps.ssh.outputs.port }}" \
            "${{ steps.ssh.outputs.user }}@${{ steps.ssh.outputs.host }}" << 'INSTALL_SCRIPT'
          set -euo pipefail
          tar xzf ~/assettracker.tgz
          sudo ./assettracker install \
            --license ~/license.yaml \
            --airgap ~/assettracker.airgap \
            --headless \
            --installer-password changeme \
            --ignore-host-preflights \
            --yes
          INSTALL_SCRIPT

      - name: Verify all pods are Running
        timeout-minutes: 5
        run: |
          ssh -i ec-ci-key -p "${{ steps.ssh.outputs.port }}" \
            "${{ steps.ssh.outputs.user }}@${{ steps.ssh.outputs.host }}" << 'VERIFY_SCRIPT'
          set -euo pipefail
          sudo assettracker shell -c "k0s kubectl wait --for=condition=ready pods --all --all-namespaces --field-selector=status.phase!=Succeeded --timeout=300s"
          echo "--- Final pod status ---"
          sudo assettracker shell -c "k0s kubectl get pods -A"
          VERIFY_SCRIPT

      - name: Expose app port
        id: expose-port
        run: |
          OUTPUT=$(replicated vm port expose "${{ steps.create-vm.outputs.vm-id }}" \
            --port 30080 \
            --protocol https \
            --output json)
          HOSTNAME=$(echo "$OUTPUT" | jq -r '.hostname')
          if [ -z "$HOSTNAME" ] || [ "$HOSTNAME" = "null" ]; then
            echo "ERROR: Could not determine hostname"
            echo "$OUTPUT"
            exit 1
          fi
          echo "hostname=$HOSTNAME" >> "$GITHUB_OUTPUT"

      - name: Verify app is accessible
        run: |
          BASE_URL="https://${{ steps.expose-port.outputs.hostname }}"
          echo "Testing health endpoint..."
          curl -sf --retry 10 --retry-delay 5 --max-time 10 "${BASE_URL}/api/health"
          echo ""
          echo "Testing login page..."
          curl -sf --retry 5 --retry-delay 5 --max-time 10 -o /dev/null -w "%{http_code}" "${BASE_URL}/login"
          echo ""
          echo "App is accessible!"

  # ─── Promote Release ──────────────────────────────────────────────
  promote-release:
    needs: [create-release, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Promote to Unstable
        uses: replicatedhq/replicated-actions/promote-release@v1.20.0
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          channel-to: unstable
          release-sequence: ${{ needs.create-release.outputs.release-sequence }}
          release-version: ${{ env.APP_VERSION }}

  # ─── Cleanup ──────────────────────────────────────────────────────
  cleanup:
    needs: [create-release, e2e-tests, ec-install-test, ec-upgrade-test, ec-airgap-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Install Replicated CLI
        run: |
          curl -s https://api.github.com/repos/replicatedhq/replicated/releases/latest \
            | grep "browser_download_url.*linux_amd64.tar.gz" \
            | cut -d '"' -f 4 \
            | xargs curl -sL -o replicated.tar.gz
          mkdir -p /tmp/replicated-cli
          tar xzf replicated.tar.gz -C /tmp/replicated-cli replicated
          sudo mv /tmp/replicated-cli/replicated /usr/local/bin/

      # E2E cleanup
      - name: Remove e2e cluster
        if: needs.e2e-tests.outputs.cluster-id != ''
        uses: replicatedhq/replicated-actions/remove-cluster@v1.20.0
        continue-on-error: true
        with:
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          cluster-id: ${{ needs.e2e-tests.outputs.cluster-id }}

      - name: Archive e2e customer
        if: needs.e2e-tests.outputs.customer-id != ''
        uses: replicatedhq/replicated-actions/archive-customer@v1.20.0
        continue-on-error: true
        with:
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          customer-id: ${{ needs.e2e-tests.outputs.customer-id }}

      # EC install cleanup
      - name: Remove EC install VM
        if: needs.ec-install-test.outputs.vm-id != ''
        continue-on-error: true
        run: replicated vm rm "${{ needs.ec-install-test.outputs.vm-id }}"

      - name: Archive EC install customer
        if: needs.ec-install-test.outputs.customer-id != ''
        uses: replicatedhq/replicated-actions/archive-customer@v1.20.0
        continue-on-error: true
        with:
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          customer-id: ${{ needs.ec-install-test.outputs.customer-id }}

      - name: Archive EC install channel
        if: needs.ec-install-test.outputs.channel-slug != ''
        uses: replicatedhq/replicated-actions/archive-channel@v1.20.0
        continue-on-error: true
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          channel-slug: ${{ needs.ec-install-test.outputs.channel-slug }}

      # EC upgrade cleanup
      - name: Remove EC upgrade VM
        if: needs.ec-upgrade-test.outputs.vm-id != ''
        continue-on-error: true
        run: replicated vm rm "${{ needs.ec-upgrade-test.outputs.vm-id }}"

      - name: Archive EC upgrade customer
        if: needs.ec-upgrade-test.outputs.customer-id != ''
        uses: replicatedhq/replicated-actions/archive-customer@v1.20.0
        continue-on-error: true
        with:
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          customer-id: ${{ needs.ec-upgrade-test.outputs.customer-id }}

      - name: Archive EC upgrade channel
        if: needs.ec-upgrade-test.outputs.channel-slug != ''
        uses: replicatedhq/replicated-actions/archive-channel@v1.20.0
        continue-on-error: true
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          channel-slug: ${{ needs.ec-upgrade-test.outputs.channel-slug }}

      # EC airgap cleanup
      - name: Remove EC airgap VM
        if: needs.ec-airgap-test.outputs.vm-id != ''
        continue-on-error: true
        run: replicated vm rm "${{ needs.ec-airgap-test.outputs.vm-id }}"

      - name: Archive EC airgap customer
        if: needs.ec-airgap-test.outputs.customer-id != ''
        uses: replicatedhq/replicated-actions/archive-customer@v1.20.0
        continue-on-error: true
        with:
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          customer-id: ${{ needs.ec-airgap-test.outputs.customer-id }}

      - name: Archive EC airgap channel
        if: needs.ec-airgap-test.outputs.channel-slug != ''
        uses: replicatedhq/replicated-actions/archive-channel@v1.20.0
        continue-on-error: true
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          channel-slug: ${{ needs.ec-airgap-test.outputs.channel-slug }}

      # Main channel cleanup
      - name: Archive main CI channel
        uses: replicatedhq/replicated-actions/archive-channel@v1.20.0
        continue-on-error: true
        with:
          app-slug: ${{ env.APP_SLUG }}
          api-token: ${{ env.REPLICATED_API_TOKEN }}
          channel-slug: ${{ needs.create-release.outputs.channel-slug }}
