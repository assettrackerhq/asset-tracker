name: E2E Tests and Release

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  prepare-cluster:
    runs-on: ubuntu-latest
    outputs:
      cluster-id: ${{ steps.prepare-cluster.outputs.cluster-id }}
      hostname: ${{ steps.expose-port.outputs.hostname || steps.get-hostname.outputs.hostname }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        id: package
        run: |
          helm repo add helmforge https://repo.helmforge.dev
          helm repo add jetstack https://charts.jetstack.io
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm dependency build helm/asset-tracker
          helm package helm/asset-tracker --destination helm/
          echo "chart=$(ls helm/asset-tracker-*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Prepare cluster
        id: prepare-cluster
        uses: replicatedhq/replicated-actions/prepare-cluster@v1.20.0
        with:
          app-slug: ${{ secrets.REPLICATED_APP_SLUG }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          chart: ${{ steps.package.outputs.chart }}
          helm-values: |
            ingress:
              enabled: true
              className: nginx
            ingress-nginx:
              enabled: true
              controller:
                service:
                  type: NodePort
                  nodePorts:
                    http: 30080
          kubernetes-distribution: k3s
          ttl: 1h
          namespace: default
          export-kubeconfig: "true"
          helm-run-preflights: "false"
          helm-chart-name: asset-tracker

      - name: Expose port
        id: expose-port
        uses: replicatedhq/replicated-actions/expose-port@v1.20.0
        continue-on-error: true
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.prepare-cluster.outputs.cluster-id }}
          port: 30080
          protocols: https

      - name: Get exposed port hostname
        if: steps.expose-port.outputs.hostname == ''
        id: get-hostname
        run: |
          cluster_id="${{ steps.prepare-cluster.outputs.cluster-id }}"
          for i in $(seq 1 30); do
            hostname=$(curl -s -H "Authorization: ${{ secrets.REPLICATED_API_TOKEN }}" \
              "https://api.replicated.com/vendor/v3/cluster/${cluster_id}/addons" \
              | jq -r '.addons[] | select(.upstream_port == 30080 and .state == "ready") | .hostname // empty' \
              | head -1)
            if [ -n "$hostname" ]; then
              echo "hostname=$hostname" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for exposed port"
          exit 1

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: ${{ steps.package.outputs.chart }}

  e2e-tests:
    needs: prepare-cluster
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: https://${{ needs.prepare-cluster.outputs.hostname }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  create-release:
    needs: [prepare-cluster, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Download chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart

      - name: Determine version and chart
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          echo "chart=$(ls asset-tracker-*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: replicatedhq/replicated-actions/create-release@v1.20.0
        with:
          app-slug: ${{ secrets.REPLICATED_APP_SLUG }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          chart: ${{ steps.meta.outputs.chart }}
          promote-channel: unstable
          version: ${{ steps.meta.outputs.version }}
