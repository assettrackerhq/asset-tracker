name: E2E Tests and Release

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  APP_VERSION: 0.1.0-${{ github.run_id }}.${{ github.run_attempt }}
  CHANNEL_NAME: ci-${{ github.run_id }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      channel-slug: ${{ steps.create-release.outputs.channel-slug }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package Helm chart
        id: package
        run: |
          helm repo add helmforge https://repo.helmforge.dev
          helm repo add jetstack https://charts.jetstack.io
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          sed -i "s/^version:.*/version: ${{ env.APP_VERSION }}/" helm/asset-tracker/Chart.yaml
          helm dependency build helm/asset-tracker
          helm package helm/asset-tracker --destination helm/
          echo "chart=$(ls helm/asset-tracker-*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Create release
        id: create-release
        uses: replicatedhq/replicated-actions/create-release@v1.20.0
        with:
          app-slug: ${{ secrets.REPLICATED_APP_SLUG }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          chart: ${{ steps.package.outputs.chart }}
          promote-channel: ${{ env.CHANNEL_NAME }}
          version: ${{ env.APP_VERSION }}

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: ${{ steps.package.outputs.chart }}

  e2e-tests:
    needs: create-release
    runs-on: ubuntu-latest
    outputs:
      cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}
      customer-id: ${{ steps.create-customer.outputs.customer-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create customer
        id: create-customer
        uses: replicatedhq/replicated-actions/create-customer@v1.20.0
        with:
          app-slug: ${{ secrets.REPLICATED_APP_SLUG }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          customer-name: ci-${{ github.run_id }}
          customer-email: ci-${{ github.run_id }}@example.com
          channel-slug: ${{ needs.create-release.outputs.channel-slug }}
          is-kots-install-enabled: "false"
          expires-in: 1

      - name: Create cluster
        id: create-cluster
        uses: replicatedhq/replicated-actions/create-cluster@v1.20.0
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          kubernetes-distribution: k3s
          cluster-name: ci-${{ github.run_id }}
          ttl: 1h
          export-kubeconfig: "true"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy the app
        uses: replicatedhq/replicated-actions/helm-install@v1.20.0
        with:
          kubeconfig: ${{ steps.create-cluster.outputs.cluster-kubeconfig }}
          helm-path: helm
          registry-username: ci-${{ github.run_id }}@example.com
          registry-password: ${{ steps.create-customer.outputs.license-id }}
          chart: oci://registry.replicated.com/${{ secrets.REPLICATED_APP_SLUG }}/${{ needs.create-release.outputs.channel-slug }}/asset-tracker
          name: asset-tracker
          version: ${{ env.APP_VERSION }}
          namespace: default
          values: |
            global:
              proxy:
                enabled: true
                domain: proxy.assettracker.tech
                appSlug: assettracker
            ingress:
              enabled: true
              className: nginx
            ingress-nginx:
              enabled: true
              imagePullSecrets:
                - name: enterprise-pull-secret
              global:
                image:
                  registry: proxy.assettracker.tech/proxy/assettracker/registry.k8s.io
              controller:
                service:
                  type: NodePort
                  nodePorts:
                    http: 30080
            postgresql:
              image:
                repository: proxy.assettracker.tech/proxy/assettracker/docker.io/library/postgres
                tag: "18.3-trixie"
              imagePullSecrets:
                - name: enterprise-pull-secret
            mailpit:
              enabled: true
              image:
                repository: proxy.assettracker.tech/proxy/assettracker/docker.io/axllent/mailpit
                tag: latest
              service:
                type: NodePort
                httpNodePort: 30025

      - name: Expose port
        id: expose-port
        uses: replicatedhq/replicated-actions/expose-port@v1.20.0
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}
          port: 30080
          protocols: https

      - name: Expose Mailpit port
        id: expose-mailpit
        uses: replicatedhq/replicated-actions/expose-port@v1.20.0
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}
          port: 30025
          protocols: https

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: https://${{ steps.expose-port.outputs.hostname }}
          MAILPIT_URL: https://${{ steps.expose-mailpit.outputs.hostname }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  promote-release:
    needs: [create-release, e2e-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Download chart artifact
        uses: actions/download-artifact@v4
        with:
          name: helm-chart

      - name: Determine chart
        id: meta
        run: echo "chart=$(ls asset-tracker-*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Promote to Unstable
        uses: replicatedhq/replicated-actions/create-release@v1.20.0
        with:
          app-slug: ${{ secrets.REPLICATED_APP_SLUG }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          chart: ${{ steps.meta.outputs.chart }}
          promote-channel: Unstable

  cleanup:
    needs: [create-release, e2e-tests]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Remove cluster
        if: needs.e2e-tests.outputs.cluster-id != ''
        uses: replicatedhq/replicated-actions/remove-cluster@v1.20.0
        continue-on-error: true
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ needs.e2e-tests.outputs.cluster-id }}

      - name: Archive customer
        if: needs.e2e-tests.outputs.customer-id != ''
        uses: replicatedhq/replicated-actions/archive-customer@v1.20.0
        continue-on-error: true
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          customer-id: ${{ needs.e2e-tests.outputs.customer-id }}

      - name: Archive channel
        uses: replicatedhq/replicated-actions/archive-channel@v1.20.0
        continue-on-error: true
        with:
          app-slug: ${{ secrets.REPLICATED_APP_SLUG }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          channel-slug: ${{ needs.create-release.outputs.channel-slug }}
