apiVersion: kots.io/v1beta1
kind: Config
metadata:
  name: asset-tracker
spec:
  groups:
    - name: database
      title: Database
      description: Configure the PostgreSQL database for Asset Tracker.
      items:
        - name: postgres_type
          title: PostgreSQL
          type: select_one
          default: embedded
          items:
            - name: embedded
              title: Embedded (recommended)
            - name: external
              title: External
        - name: postgres_embedded_password
          title: Embedded Database Password
          type: password
          hidden: true
          value: '{{repl RandomString 32 }}'
          when: '{{repl ConfigOptionEquals "postgres_type" "embedded" }}'
        - name: postgres_host
          title: Host
          type: text
          when: '{{repl ConfigOptionEquals "postgres_type" "external" }}'
          required: true
        - name: postgres_port
          title: Port
          type: text
          default: "5432"
          when: '{{repl ConfigOptionEquals "postgres_type" "external" }}'
          required: true
        - name: postgres_database
          title: Database Name
          type: text
          default: "asset_tracker"
          when: '{{repl ConfigOptionEquals "postgres_type" "external" }}'
          required: true
        - name: postgres_username
          title: Username
          type: text
          when: '{{repl ConfigOptionEquals "postgres_type" "external" }}'
          required: true
        - name: postgres_password
          title: Password
          type: password
          when: '{{repl ConfigOptionEquals "postgres_type" "external" }}'
          required: true
    - name: integrations
      title: Integrations
      description: Configure optional third-party integrations for Asset Tracker.
      items:
        - name: plaid_enabled
          title: Plaid Integration
          help_text: Enable Plaid to allow users to link bank accounts.
          type: select_one
          default: disabled
          items:
            - name: disabled
              title: Disabled
            - name: enabled
              title: Enabled
        - name: plaid_client_id
          title: Plaid Client ID
          type: text
          when: '{{repl ConfigOptionEquals "plaid_enabled" "enabled" }}'
          required: true
        - name: plaid_secret
          title: Plaid Secret
          type: password
          when: '{{repl ConfigOptionEquals "plaid_enabled" "enabled" }}'
          required: true
        - name: teller_enabled
          title: Teller Integration
          help_text: Enable Teller to allow users to link bank accounts.
          type: select_one
          default: disabled
          items:
            - name: disabled
              title: Disabled
            - name: enabled
              title: Enabled
        - name: teller_application_id
          title: Teller Application ID
          type: text
          when: '{{repl ConfigOptionEquals "teller_enabled" "enabled" }}'
          required: true
